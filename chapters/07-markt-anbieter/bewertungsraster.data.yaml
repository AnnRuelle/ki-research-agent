schema_version: 2
last_updated: "2026-04-15"
description: "Vergleich der KI-Plattform-Anbieter fuer kantonale Verwaltungen — 3-Ebenen-Taxonomie"

columns:
  - name: Anbieter
  - name: Ebene
  - name: Deployment
  - name: CH-Region
  - name: Datenstandort
  - name: Zertifizierungen
  - name: Preismodell
  - name: Modelle
  - name: Staerken
  - name: Schwaechen

rows:
  # ── Ebene 1: Infra Provider ──
  - anbieter: "Azure OpenAI Service"
    ebene: 1
    deployment: "Cloud"
    ch_region: "Switzerland North/West"
    datenstandort: "Schweiz"
    zertifizierungen: "ISO 27001, SOC 2, C5, ISAE 3402"
    preismodell: "Pay-per-Token"
    modelle: "GPT-4o, GPT-4o-mini, DALL-E, Whisper"
    staerken: "CH-Region, Enterprise-Support, breites Modellportfolio, Bing Grounding"
    schwaechen: "Vendor Lock-in, komplexe Kostenprognose"

  - anbieter: "AWS Bedrock"
    ebene: 1
    deployment: "Cloud"
    ch_region: "Zuerich (eu-central-2)"
    datenstandort: "Schweiz"
    zertifizierungen: "ISO 27001, SOC 2, C5"
    preismodell: "Pay-per-Token"
    modelle: "Claude, Llama, Mistral, Titan"
    staerken: "Multi-Modell-Zugang, CH-Region, gute API"
    schwaechen: "Weniger Enterprise-Features als Azure"

  - anbieter: "Google Vertex AI"
    ebene: 1
    deployment: "Cloud"
    ch_region: "Zuerich (europe-west6)"
    datenstandort: "Schweiz"
    zertifizierungen: "ISO 27001, SOC 2"
    preismodell: "Pay-per-Token + Provisioned Throughput"
    modelle: "Gemini 2.x"
    staerken: "Starke Multimodalitaet, Grounding, Search-Integration"
    schwaechen: "Weniger Verwaltungs-Referenzen in CH"

  - anbieter: "Anthropic (Claude)"
    ebene: 1
    deployment: "Cloud (via AWS/GCP)"
    ch_region: "Via AWS Zuerich oder GCP Zuerich"
    datenstandort: "Abhaengig vom Hosting-Provider"
    zertifizierungen: "SOC 2 Type II"
    preismodell: "Pay-per-Token"
    modelle: "Claude Opus, Sonnet, Haiku"
    staerken: "Starke Textqualitaet, Constitutional AI, grosse Kontextfenster"
    schwaechen: "Kein eigenes CH-Hosting"

  - anbieter: "Microsoft Copilot Studio"
    ebene: 1
    deployment: "Cloud (Azure)"
    ch_region: "Switzerland North/West"
    datenstandort: "Schweiz (via Azure)"
    zertifizierungen: "ISO 27001, SOC 2, C5"
    preismodell: "Pro-User/Monat + Pay-per-Message"
    modelle: "GPT-4o (via Azure OpenAI)"
    staerken: "Low-Code, tiefste M365/Entra-Integration, kuerzeste Time-to-Value"
    schwaechen: "Maximaler Microsoft-Lock-in, Datenschutz-Bedenken (gleiche wie bei Copilot?)"

  # ── Ebene 2: Managed Platform ──
  - anbieter: "BEGASOFT Brandbot"
    ebene: 2
    deployment: "Private Cloud (BEGASOFT CH)"
    ch_region: "Schweizer Rechenzentren (Tier-IV)"
    datenstandort: "Schweiz (garantiert)"
    zertifizierungen: "ISO 27001, ISAE 3000"
    preismodell: "Nicht oeffentlich"
    modelle: "Multi-Modell: GPT-4o, Gemini, Llama 3.x, Mistral"
    staerken: "SSGI-Zuschlag 6 Kantone, volle Datensouveraenitaet, MCP-Integration, Mandantenfaehigkeit"
    schwaechen: "Pricing unklar, foederale Skalierung noch unbewiesen, Azure-Integration offen"

  - anbieter: "Abraxas (Schweiz)"
    ebene: 2
    deployment: "Private Cloud"
    ch_region: "Schweizer Rechenzentren"
    datenstandort: "Schweiz (garantiert)"
    zertifizierungen: "ISO 27001, ISAE 3402"
    preismodell: "Lizenz + Betrieb"
    modelle: "Diverse, kantonal angepasst"
    staerken: "Tiefe oeV-Integration, kantonale Referenzen, Ostschweizer Kantone"
    schwaechen: "Regional fokussiert (zu pruefen nach Ostschweizer KI-Analyse)"

  - anbieter: "Evoya AI"
    ebene: 2
    deployment: "SaaS / On-Premise"
    ch_region: "ISO-zertifizierte EU-Rechenzentren"
    datenstandort: "EU/CH"
    zertifizierungen: "DSGVO-konform"
    preismodell: "Nicht recherchiert"
    modelle: "Multi-Modell"
    staerken: "Agents, Transkription, Multi-Channel, On-Premise-Option"
    schwaechen: "Keine bekannte oeV-Referenz auf Kantonsebene"

  - anbieter: "CMI KI+"
    ebene: 2
    deployment: "In CMI-Plattform integriert"
    ch_region: "Schweiz"
    datenstandort: "Schweiz"
    zertifizierungen: "Nicht recherchiert"
    preismodell: "Nicht recherchiert"
    modelle: "Open-Source"
    staerken: "Direkte Integration in CMI (weit verbreitet in CH-Gemeinden)"
    schwaechen: "Nur relevant fuer CMI-Nutzer"
