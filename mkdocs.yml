docs_dir: "docs"

site_name: "KI-Plattform für kantonale Verwaltung"
site_description: "Agent-gestützte Wissensdatenbank"
site_url: "https://annruelle.github.io/ki-research-agent/"

theme:
  name: material
  language: de
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Dunkel
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Hell
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - content.tabs.link

plugins:
  - search:
      lang: de

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html

