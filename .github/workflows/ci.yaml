name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check . --exclude site/ --exclude docs/

      - name: Ruff format check
        run: ruff format --check . --exclude site/ --exclude docs/

      - name: mypy type check
        run: mypy agents/ tests/ --ignore-missing-imports

      - name: pytest (unit tests only)
        run: pytest -m unit --tb=short
