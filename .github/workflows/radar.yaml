name: Radar (manual)

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which radar(s) to run"
        type: choice
        required: true
        default: "llm_news"
        options:
          - plattformen
          - beschaffungen
          - llm_news
          - --daily
          - --weekly
          - --all-enabled

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

permissions:
  contents: write

jobs:
  radar:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run radar
        run: python -m agents.radar ${{ github.event.inputs.target }}

      - name: Commit results
        run: |
          git config user.name "ki-kb-bot"
          git config user.email "ki-kb-bot@users.noreply.github.com"
          git add radar/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[agent:radar] $(date +%Y-%m-%d): ${{ github.event.inputs.target }}"
            git push
          fi
